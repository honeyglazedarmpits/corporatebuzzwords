<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corporate Buzzword Generator</title>

<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
  margin-top:50px;
  background:#f5f5f5;
}

button, a{
  padding:12px 25px;
  font-size:16px;
  cursor:pointer;
  border-radius:8px;
  border:none;
  margin:10px 5px;
  text-decoration:none;
  color:white;
}

#generate-btn{
  background-color:#007BFF;
}

#copy-btn{
  background-color:#28a745;
}

#tweet-btn{
  background-color:#1DA1F2;
}

#output{
  margin-top:30px;
  font-size:22px;
  font-weight:bold;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
}

#score{
  margin-top:20px;
  font-size:18px;
  font-weight:bold;
}

#message{
  margin-top:15px;
  font-size:16px;
  color:#555;
  height:20px;
}
</style>
</head>

<body>

<h1>Corporate Buzzword Generator</h1>

<p>
<a href="linkedin-post-generator.html">Try the LinkedIn Thought Leader Generator</a>
</p>

<button id="generate-btn" onclick="generate()">Generate Corporate Wisdom</button>

<div id="output"></div>

<button id="copy-btn">Copy to Clipboard</button>
<a id="tweet-btn" target="_blank">Tweet This</a>

<div id="message"></div>

<div id="score">Buzzword Streak: 0</div>

<script>

const verbs_base = ["leverage","optimize","activate","facilitate","streamline","empower","drive","unlock","synergize","pivot","monetize","scale","align","integrate","deploy","orchestrate","redefine","innovate","maximize","catalyze"];

const verbs_ing = ["leveraging","optimizing","activating","facilitating","streamlining","empowering","driving","unlocking","synergizing","pivoting","monetizing","scaling","aligning","integrating","deploying","orchestrating","redefining","innovating","maximizing","catalyzing"];

const adjectives = ["robust","innovative","strategic","scalable","disruptive","dynamic","cross-functional","cutting-edge","integrated","holistic","forward-thinking","next-gen","efficient","agile","transformative","synergistic","streamlined","visionary","optimized","impactful"];

const nouns = ["framework","solution","initiative","paradigm","workflow","process","platform","synergy","pipeline","touchpoint","strategy","ecosystem","roadmap","interface","alignment","matrix","deliverable","benchmark","ROI"];

const goals = ["ROI","synergy","market share","scalability","efficiency","alignment","growth","impact","customer satisfaction","brand value","optimization","innovation","engagement","profitability","adoption","revenue","leverage","KPIs","visibility","productivity"];

let streak = 0;

const trackedBuzzwords = ["synergy","bleeding-edge","pivot","ROI","scalability","disruptive","holistic","alignment","leverage","innovative"];

function rand(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function showMessage(text){
  const msg = document.getElementById("message");
  msg.innerText = text;
  setTimeout(() => msg.innerText = "", 3000);
}

const templates = [

`We must ${rand(verbs_base)} our ${rand(adjectives)} ${rand(nouns)} to achieve ${rand(goals)}.`,

`By ${rand(verbs_ing)} our ${rand(adjectives)} ${rand(nouns)}, we can drive ${rand(goals)}.`,

`Our strategy is to ${rand(verbs_base)} ${rand(adjectives)} ${rand(nouns)} and unlock ${rand(goals)}.`,

`Let's circle back and ${rand(verbs_base)} the ${rand(adjectives)} ${rand(nouns)}.`,

`It's imperative to ${rand(verbs_base)} ${rand(adjectives)} ${rand(nouns)} for maximum ${rand(goals)}.`,

`This quarter, we will ${rand(verbs_base)} ${rand(adjectives)} ${rand(nouns)} to supercharge ${rand(goals)}.`,

`We can't move forward until we ${rand(verbs_base)} the ${rand(adjectives)} ${rand(nouns)}.`,

`To stay competitive, our team must ${rand(verbs_base)} ${rand(adjectives)} ${rand(nouns)} immediately.`,

`The CEO insists we ${rand(verbs_base)} ${rand(adjectives)} ${rand(nouns)} for optimal ${rand(goals)}.`,

`All departments should ${rand(verbs_base)} ${rand(adjectives)} ${rand(nouns)} to align with ${rand(goals)}.`,

`If we ${rand(verbs_base)} our ${rand(adjectives)} ${rand(nouns)}, we'll unlock unprecedented ${rand(goals)}.`,

`Our quarterly plan is to ${rand(verbs_base)} ${rand(adjectives)} ${rand(nouns)} while keeping ${rand(goals)} in mind.`,

`Let's ${rand(verbs_base)} ${rand(adjectives)} ${rand(nouns)} and circle back on ${rand(goals)}.`,

`We are committed to ${rand(verbs_base)} ${rand(adjectives)} ${rand(nouns)} in pursuit of ${rand(goals)}.`,

`By ${rand(verbs_ing)} the ${rand(adjectives)} ${rand(nouns)}, we will drive ${rand(goals)} forward.`,

`This initiative allows us to ${rand(verbs_base)} ${rand(adjectives)} ${rand(nouns)} with a focus on ${rand(goals)}.`,

`To maximize efficiency, we must ${rand(verbs_base)} ${rand(adjectives)} ${rand(nouns)} before reviewing ${rand(goals)}.`,

`Our new mission is to ${rand(verbs_base)} ${rand(adjectives)} ${rand(nouns)} while accelerating ${rand(goals)}.`,

`The board recommends we ${rand(verbs_base)} ${rand(adjectives)} ${rand(nouns)} to future-proof ${rand(goals)}.`,

`It's time to ${rand(verbs_base)} ${rand(adjectives)} ${rand(nouns)} and rethink ${rand(goals)} entirely.`,

`We believe that by ${rand(verbs_ing)} ${rand(adjectives)} ${rand(nouns)}, we can redefine ${rand(goals)}.`

];

function generate(){

  const sentence = templates[Math.floor(Math.random() * templates.length)];

  document.getElementById("output").innerText = sentence;

  if(trackedBuzzwords.some(word => sentence.toLowerCase().includes(word))){
      streak++;
  } else {
      streak = 0;
  }

  document.getElementById("score").innerText = "Buzzword Streak: " + streak;

  if(streak === 5){
      showMessage("Buzzword Master! Organize a meeting or something.");
  }

  document.getElementById("tweet-btn").href =
  `https://x.com/intent/tweet?text=${encodeURIComponent("Corporate Buzzword of the Day: " + sentence + " #BuzzwordBingo #OfficeHumor")}`;

}

document.getElementById("copy-btn").addEventListener("click", function(){

  const text = document.getElementById("output").innerText;

  if(text){

    navigator.clipboard.writeText(text)
    .then(() => showMessage("Copied to clipboard"))
    .catch(err => showMessage("Copy failed"));

  }

});

</script>

</body>

</html>
